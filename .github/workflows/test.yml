---
name: Run tests

on:
  workflow_call:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest

    concurrency:
      group: terrascaler-tests
      cancel-in-progress: false

    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Run tests
        run: make test

      - name: Build binary
        run: make build
